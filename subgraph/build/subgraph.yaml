specVersion: 0.0.5
schema:
  file: schema.graphql
dataSources:
  - kind: ethereum/contract
    name: GoodDrops
    network: celo
    source:
      address: "0x261565422E8ec1340F84d3AdadBF4aD5Fc7D5131"
      abi: GoodDrops
      startBlock: 68225001
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - Drop
      abis:
        - name: GoodDrops
          file: GoodDrops/GoodDrops.json
      eventHandlers:
        - event: DropCreated(indexed uint256,indexed address,int32,int32,uint96,uint40,string)
          handler: handleDropCreated
        - event: DropClaimed(indexed uint256,indexed address,indexed address,uint96,uint40)
          handler: handleDropClaimed
        - event: DropReclaimed(indexed uint256,indexed address,uint96)
          handler: handleDropReclaimed
      file: GoodDrops/GoodDrops.wasm
